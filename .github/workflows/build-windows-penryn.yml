name: build-bun-penryn-windows

# Manually triggered: go to the Actions tab on your fork/repo on
# GitHub.com -> "build-bun-penryn-windows" -> "Run workflow".
#
# Runs entirely on GitHub's windows-latest runner — a normal, modern
# CPU, so the bootstrap problem in docs/ARCHITECTURE.md ("layer 0")
# doesn't apply here, and Visual Studio Build Tools are already
# preinstalled on that image. You never install or configure Visual
# Studio yourself; this is the whole point of building it this way.
#
# Real run history so far (see docs/DECISIONS.md for full writeups):
# run #1: bootstrap worked, failed on wrong LLVM version (fixed, #11)
# run #2: WebKit compiled clean under -march=penryn (the core
#         hypothesis of this project, confirmed for real), then hit an
#         unrelated pre-existing build bug in bun's own source (fixed
#         via patch 0003, #12), AND a bug in this workflow's own
#         artifact path that silently dropped the built exe (fixed,
#         #13 — the path is now discovered dynamically instead of
#         hardcoded, so this shouldn't recur the same way).
# Not yet confirmed: a clean run start-to-finish with a downloadable
# bun.exe, or how that binary behaves on the real E8400.
#
# Caching: ccache's directory now persists across runs via
# actions/cache (#17) — every run before this cached nothing across
# the VM teardown, so every iteration paid full from-zero compile
# cost regardless of how small the actual change was. This run
# onward should be faster once the cache is warm.
#
# Output: a bun.exe artifact, attached to the completed run, that you
# download and copy to the E8400 for the real test (script
# 02-test-artifact.sh).

on:
  workflow_dispatch:
    inputs:
      build_cloop_variant:
        description: "Also build the JIT-disabled (CLoop) fallback variant"
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout this repo (must include patches/ from this package)
        uses: actions/checkout@v4

      - name: Bootstrap — install official Bun
        shell: pwsh
        run: |
          irm bun.sh/install.ps1 | iex
          echo "$HOME\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sanity-check bootstrap Bun runs on this runner
        shell: pwsh
        run: bun --version

      - name: Install the exact pinned LLVM/clang-cl version Bun requires
        shell: pwsh
        run: |
          # Neither choco's "llvm" package nor Visual Studio's bundled
          # LLVM matched on the first real run of this workflow — Bun's
          # build checks for an exact version RANGE (was >=21.1.0
          # <21.1.99 as of this research; printed in the build's own
          # error if it's ever rejected again) and choco gave 20.1.8,
          # VS gave 22.1.3, both rejected. Installing the official
          # release directly, pinned, sidesteps guessing through a
          # package manager's whatever-is-current version.
          #
          # If Bun bumps this pin later and this step starts failing
          # the SAME way again, re-run the workflow once to get the
          # current error's exact required range/version hint, then
          # update the version number below (and in the URL/filename)
          # to match — don't just retry blindly.
          $version = "21.1.8"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/LLVM-$version-win64.exe"
          $installer = "$env:TEMP\LLVM-$version-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify clang-cl version before going any further
        shell: pwsh
        run: clang-cl --version

      - name: Install nasm (needed for Windows x64 BoringSSL asm)
        shell: pwsh
        run: choco install nasm -y --no-progress

      - name: Set up persistent ccache directory
        shell: pwsh
        run: |
          # GitHub tears down the whole VM after every run, so without
          # this, ccache (already wired in by Bun's own build via
          # CMAKE_C/CXX_COMPILER_LAUNCHER — visible in any build log as
          # ccache.exe wrapping clang-cl) never gets to actually cache
          # anything across runs; every iteration recompiles from zero,
          # which is most of why this has been so slow to iterate on.
          # actions/cache below persists this directory across runs.
          # Setting CCACHE_DIR explicitly rather than relying on
          # ccache's platform default, so the cache step below has a
          # known, fixed path to save/restore regardless of how this
          # particular ccache build resolves its default on Windows.
          New-Item -ItemType Directory -Force -Path C:\ccache | Out-Null
          echo "CCACHE_DIR=C:\ccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CCACHE_MAXSIZE=8G" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore ccache from previous runs
        uses: actions/cache@v4
        with:
          path: C:\ccache
          # One shared cache across JIT and CLoop variants and across
          # patch iterations — ccache keys each entry on the actual
          # preprocessed source + exact compiler flags, so it's safe to
          # share; a changed flag (e.g. -march=penryn vs the CLoop
          # ENABLE_* set) just means that particular entry misses and
          # gets recompiled+cached fresh, not that the whole cache is
          # wrong. restore-keys lets a run still get a partial warm
          # cache even if the exact key doesn't match.
          key: ccache-windows-penryn-${{ github.run_id }}
          restore-keys: |
            ccache-windows-penryn-

      - name: Apply this project's patches
        shell: bash
        run: |
          set -euo pipefail
          git apply --check patches/0001-add-penryn-baseline-override.patch
          git apply patches/0001-add-penryn-baseline-override.patch
          git apply --check patches/0002-add-cloop-fallback-toggle.patch
          git apply patches/0002-add-cloop-fallback-toggle.patch
          # Unrelated to the penryn work — a real, pre-existing build
          # break on bun's main branch under this exact toolchain. See
          # docs/DECISIONS.md #12. Worth periodically checking whether
          # this is still needed (upstream may fix it independently).
          git apply --check patches/0003-fix-rescle-locale-empty-build-error.patch
          git apply patches/0003-fix-rescle-locale-empty-build-error.patch
          # Bun's own bindings call directly into JSC's JIT/SamplingProfiler/
          # WebAssembly classes from a few optional features (vm.Script's
          # bytecode-cache verification, the CPU profiler, bun:jsc's
          # introspection APIs). Harmless no-op for the normal JIT build —
          # only matters for the CLoop variant, where those JSC features are
          # off. See docs/DECISIONS.md #22.
          git apply --check patches/0007-guard-jit-sampling-profiler-wasm-feature-deps.patch
          git apply patches/0007-guard-jit-sampling-profiler-wasm-feature-deps.patch
          # Same DFG-kind-constructor gap as patch 0004 — turned out Bun's
          # own webcore bindings use it too, not just WebKit's source. See
          # docs/DECISIONS.md #23.
          git apply --check patches/0008-guard-bun-domjit-effect-kinds-usage.patch
          git apply patches/0008-guard-bun-domjit-effect-kinds-usage.patch
          git diff --stat

      - name: Clone pinned WebKit fork commit (local WebKit build)
        shell: bash
        run: |
          set -euo pipefail
          COMMIT="$(grep -m1 'WEBKIT_VERSION =' scripts/build/deps/webkit.ts | sed -E 's/.*"([0-9a-f]+)".*/\1/')"
          echo "Pinned WebKit commit: $COMMIT"
          git clone https://github.com/oven-sh/WebKit.git vendor/WebKit
          git -C vendor/WebKit checkout "$COMMIT"

      - name: Apply WebKit-side patches (unconditional DFG-type usage that breaks ENABLE_DFG_JIT=OFF, needed for the CLoop variant, harmless/no-op for the normal JIT build)
        shell: bash
        run: |
          set -euo pipefail
          PATCH4="$(pwd)/patches/0004-domjit-effect-guard-dfg-kinds.patch"
          PATCH5="$(pwd)/patches/0005-add-missing-structureinlines-includes.patch"
          PATCH6="$(pwd)/patches/0006-add-missing-scopeexit-includes.patch"
          cd vendor/WebKit
          git apply --check "$PATCH4"
          git apply "$PATCH4"
          git apply --check "$PATCH5"
          git apply "$PATCH5"
          git apply --check "$PATCH6"
          git apply "$PATCH6"

      - name: Build WebKit (JSC/WTF/bmalloc) only — fails fast if -march=penryn breaks the compile
        shell: pwsh
        env:
          BUN_CPU_MARCH: "-march=penryn"
        run: bun run build --profile=release-local --webkit=local --baseline=on --target=WebKit

      - name: Build full bun.exe
        shell: pwsh
        env:
          BUN_CPU_MARCH: "-march=penryn"
        run: bun run build --profile=release-local --webkit=local --baseline=on

      - name: Stage the built exe(s) for upload (path confirmed by run #2 — see docs/DECISIONS.md #13)
        shell: pwsh
        run: |
          # The first real run showed the build actually lands at
          # build/release/bun.exe — NOT build/release-local/bun.exe as
          # originally guessed from the --profile name. Discovering it
          # dynamically here instead of hardcoding a path again, so a
          # future profile-naming change doesn't silently break this
          # the same way (this is what actually happened last time).
          New-Item -ItemType Directory -Force -Path artifact-staging | Out-Null
          $exes = @(Get-ChildItem -Recurse -Filter "bun.exe" build -ErrorAction SilentlyContinue) +
                  @(Get-ChildItem -Recurse -Filter "bun-profile.exe" build -ErrorAction SilentlyContinue)
          if (-not $exes) {
            Write-Error "No bun.exe / bun-profile.exe found anywhere under build/ - check the build log above; the build itself may have failed."
            exit 1
          }
          foreach ($f in $exes) { Copy-Item $f.FullName -Destination artifact-staging -Force }
          Get-ChildItem artifact-staging | Select-Object FullName

      - name: Upload bun.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-penryn-windows-x64
          path: artifact-staging/*.exe
          if-no-files-found: warn

      - name: Locate and upload codegen output (reusable across every -march variant — see docs/ARCHITECTURE.md "Layer 0")
        shell: pwsh
        run: |
          # Best-effort: cfg.codegenDir's exact resolved path wasn't
          # independently confirmed end-to-end (see docs/DECISIONS.md
          # #10) — this globs for it rather than hardcoding one path.
          $dirs = Get-ChildItem -Recurse -Directory -Filter "codegen" build -ErrorAction SilentlyContinue
          if ($dirs) {
            Compress-Archive -Path $dirs[0].FullName -DestinationPath codegen-output.zip
          } else {
            Write-Host "No 'codegen' directory found under build/ — check the build log above for the actual output location and adjust this step."
          }

      - name: Upload codegen artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-codegen-output-windows-x64
          path: codegen-output.zip
          if-no-files-found: warn

      # ---- Optional second build: JIT disabled (CLoop), see script 06 ----
      - name: Build WebKit with CLoop (JIT disabled) — only if requested
        if: ${{ inputs.build_cloop_variant }}
        shell: pwsh
        env:
          BUN_CPU_MARCH: "-march=penryn"
          PENRYN_BUILD_CLOOP: "1"
        run: |
          # Rebuilding WebKit under a different config in the SAME checkout
          # may not cleanly invalidate prior CMake cache — if this errors
          # confusingly, the safe fix is re-running in a fresh checkout
          # (delete build/ and vendor/WebKit's build dir first).
          bun run build --profile=release-local --webkit=local --baseline=on --target=WebKit
          bun run build --profile=release-local --webkit=local --baseline=on

      - name: Stage the CLoop exe(s) for upload
        if: ${{ inputs.build_cloop_variant }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact-staging-cloop | Out-Null
          $exes = @(Get-ChildItem -Recurse -Filter "bun.exe" build -ErrorAction SilentlyContinue) +
                  @(Get-ChildItem -Recurse -Filter "bun-profile.exe" build -ErrorAction SilentlyContinue)
          if (-not $exes) {
            Write-Error "No bun.exe / bun-profile.exe found anywhere under build/ after the CLoop rebuild - check the log above."
            exit 1
          }
          foreach ($f in $exes) { Copy-Item $f.FullName -Destination artifact-staging-cloop -Force }

      - name: Upload CLoop bun.exe artifact
        if: ${{ inputs.build_cloop_variant }}
        uses: actions/upload-artifact@v4
        with:
          name: bun-penryn-cloop-windows-x64
          path: artifact-staging-cloop/*.exe
          if-no-files-found: warn
